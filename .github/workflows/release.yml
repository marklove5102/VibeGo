name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: release tag like v0.0.4
        required: true
        type: string

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Frontend checks
        run: |
          cd ui
          pnpm install --frozen-lockfile
          pnpm run lint
          pnpm run build

      - name: Go tests
        run: go test ./...

  build:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build frontend
        run: |
          cd ui
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Build backend
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          mkdir -p dist
          ext=""
          if [ "${GOOS}" = "windows" ]; then ext=".exe"; fi
          output="vibego_${VERSION_TAG}_${GOOS}_${GOARCH}${ext}"
          go build -trimpath -ldflags "-s -w -X github.com/xxnuo/vibego/internal/version.Version=${VERSION_TAG}" -o "dist/${output}" ./

      - name: Package artifact
        env:
          VERSION_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          mkdir -p artifacts
          bin="vibego_${VERSION_TAG}_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            bin="${bin}.exe"
          fi
          tar_name="${bin%.exe}.tar.gz"
          tar -C dist -czf "artifacts/${tar_name}" "${bin}"

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: artifacts/*.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: astral-sh/setup-uv@v5

      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Collect files
        run: |
          mkdir -p release
          find release-artifacts -type f -name '*.tar.gz' -exec cp {} release/ \;
          cd release
          sha256sum *.tar.gz > checksums.txt

      - name: Stage npm packages
        env:
          TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          uv run python scripts/stage_npm_packages.py --tag "${TAG_NAME}" --artifacts-dir release --output-dir release/npm

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.tar.gz
            release/checksums.txt
            release/npm/*.tgz

      - name: Trigger npm workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          is_prerelease="false"
          if ! [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            is_prerelease="true"
          fi

          payload_file="$(mktemp)"
          cat > "${payload_file}" <<JSON
          {
            "event_type": "npm-release",
            "client_payload": {
              "tag": "${TAG}",
              "version": "${version}",
              "is_prerelease": ${is_prerelease}
            }
          }
          JSON

          gh api repos/${GITHUB_REPOSITORY}/dispatches --method POST --input "${payload_file}"
