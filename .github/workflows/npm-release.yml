name: npm-release

on:
  repository_dispatch:
    types:
      - npm-release
  workflow_dispatch:
    inputs:
      tag:
        description: release tag like v0.0.3
        required: true
        type: string
  release:
    types:
      - published

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      should_publish_npm: ${{ steps.meta.outputs.should_publish_npm }}
    steps:
      - id: meta
        env:
          TAG_NAME: ${{ github.event.client_payload.tag || github.event.release.tag_name || inputs.tag || '' }}
          VERSION_NAME: ${{ github.event.client_payload.version || '' }}
          IS_PRERELEASE: ${{ github.event.client_payload.is_prerelease || github.event.release.prerelease || 'false' }}
        run: |
          set -euo pipefail
          tag="${TAG_NAME}"
          if [[ -z "${tag}" ]]; then
            echo "missing tag"
            exit 1
          fi

          version="${VERSION_NAME}"
          if [[ -z "${version}" ]]; then
            version="${tag#v}"
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          if [[ "${IS_PRERELEASE}" == "true" ]]; then
            echo "should_publish_npm=false" >> "$GITHUB_OUTPUT"
          elif [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "should_publish_npm=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish_npm=false" >> "$GITHUB_OUTPUT"
          fi

  publish-npm:
    if: ${{ needs.meta.outputs.should_publish_npm == 'true' }}
    needs: meta
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - uses: astral-sh/setup-uv@v5

      - name: Download backend artifacts from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.meta.outputs.version }}
          TAG: ${{ needs.meta.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist/release
          patterns=(
            "vibego_v${VERSION}_android_arm64.tar.gz"
            "vibego_v${VERSION}_linux_amd64.tar.gz"
            "vibego_v${VERSION}_linux_arm64.tar.gz"
            "vibego_v${VERSION}_darwin_amd64.tar.gz"
            "vibego_v${VERSION}_darwin_arm64.tar.gz"
            "vibego_v${VERSION}_windows_amd64.tar.gz"
            "vibego_v${VERSION}_windows_arm64.tar.gz"
          )
          for pattern in "${patterns[@]}"; do
            gh release download "${TAG}" --repo "${GITHUB_REPOSITORY}" --pattern "${pattern}" --dir dist/release
          done

      - name: Stage npm tarballs
        env:
          TAG: ${{ needs.meta.outputs.tag }}
        run: |
          set -euo pipefail
          uv run python scripts/stage_npm_packages.py --tag "${TAG}" --artifacts-dir dist/release --output-dir dist/npm

      - name: Publish to npm
        env:
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -euo pipefail

          publish_one() {
            file="$1"
            access="$2"
            if [ ! -f "$file" ]; then
              echo "missing tarball: $file"
              exit 1
            fi

            set +e
            if [ -n "$access" ]; then
              out=$(npm publish "$file" --provenance --access "$access" 2>&1)
            else
              out=$(npm publish "$file" --provenance 2>&1)
            fi
            status=$?
            set -e

            echo "$out"
            if [ "$status" -eq 0 ]; then
              return 0
            fi

            if echo "$out" | grep -qiE "previously published|cannot publish over|version already exists"; then
              return 0
            fi

            exit "$status"
          }

          platforms=(android-arm64 linux-x64 linux-arm64 darwin-x64 darwin-arm64 win32-x64 win32-arm64)
          for platform in "${platforms[@]}"; do
            publish_one "dist/npm/vibego-npm-${platform}-${VERSION}.tgz" "public"
          done
          publish_one "dist/npm/vibego-npm-${VERSION}.tgz" "public"

  smoke-test:
    if: ${{ needs.meta.outputs.should_publish_npm == 'true' }}
    needs: [meta, publish-npm]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and verify
        shell: bash
        env:
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -euo pipefail
          npm i -g "vibego@${VERSION}"
          actual="$(vibego -v | tr -d '\r\n')"
          expected="v${VERSION}"
          if [ "$actual" != "$expected" ]; then
            echo "unexpected version: $actual"
            exit 1
          fi
